name: PR Review

on:
  workflow_dispatch:
    inputs:
      pr_url:
        description: "PR URL"
        required: true
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install claude-review
        run: npm install -g claude-review

      - name: Run review
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW_OUTPUT=\$(claude-review "\${{ inputs.pr_url }}")
          echo "## 🤖 Claude PR Review" >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW_OUTPUT" >> $GITHUB_STEP_SUMMARY